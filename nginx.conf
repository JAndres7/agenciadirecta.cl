server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /webhook/ {
        proxy_pass https://leccion-la-tribu-n8n.xyywd9.easypanel.host/webhook/;
        proxy_set_header Host leccion-la-tribu-n8n.xyywd9.easypanel.host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
